server {
    listen 80;
    server_name _;

    # Carpeta donde se copia el build de React/Vite.
    root /var/www/forge-core/frontend;
    index index.html;

    # Evita cache agresivo de index.html para que los cambios se vean rapido en la demo.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        try_files /index.html =404;
    }

    # SPA fallback: cualquier ruta visual vuelve a index.html.
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        try_files $uri /index.html;
    }

    # Reverse proxy: todo /api pasa al backend Express local en puerto 4000.
    location /api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
